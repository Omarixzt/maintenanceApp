name: maintenance_app
description: Offline-First Mobile Maintenance Management Application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  provider: ^6.1.1
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.5
  http: ^1.2.0
  intl: ^0.19.0
  reorderable_grid_view: ^2.2.8
  connectivity_plus: ^6.0.0
  
  workmanager: ^0.9.0+3
  
  # مكتبات الطباعة والصور
  image_picker: ^1.0.7
  esc_pos_utils_plus: ^2.0.4
  shared_preferences: ^2.2.2
  print_bluetooth_thermal: ^1.1.9
  image: ^4.8.0
  share_plus: ^12.0.1
  pdf: ^3.12.0
  printing: ^5.14.3
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  isar_generator: ^3.1.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - lib/assets/
    - logo.png

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700