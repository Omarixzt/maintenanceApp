  # الإصدار الصحيح والمستقر للطابعة
  blue_thermal_printer: ^1.2.3
  image_picker: ^1.0.7
  esc_pos_utils_plus: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  isar_generator: ^3.1.0
  flutter_launcher_icons: ^0.13.1

flutter:
